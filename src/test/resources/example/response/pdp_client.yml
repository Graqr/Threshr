        - id: cae36bfe-8be8-46d9-a9d8-5f621026c6c6
          text:
            Surprisingly sweet. This pkg. was fresh and clean. Nice and convenient
            that the carrots are pre-cut and washed. Was happy with this
            purchase.
          author:
            nickname: Maspqa Shopper 113
            external_id: "10044718119"
          title: Good and Gather cut baby carrots.
          rating:
            value: 5
            submitted_at: 2023-06-08T14:05:41.658Z
        - id: 777094a6-02d8-403c-9d5c-7700df639907
          text:
            Don’t buy these. I thought my local Target would do better. Picked up my
            order at 4pm. These carrots expiration date was the next day. Not
            that it mattered. They were dried out and gross already. Who picks
            these out? They should know better.
          author:
