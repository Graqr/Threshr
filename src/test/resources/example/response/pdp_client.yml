        downstream_description:
          No fridge is complete without Baby-Cut Carrots from Good
          & Gather™. The bag includes one pound of baby carrots that come
          peeled, washed and ready to eat for your convenience. As a bonus,
          these carrots contain no artificial preservatives and provide an
          excellent source of vitamin A. Whether you eat them straight out of
          the bag, dip them in ranch, hummus, or your favorite dressing, or use
          them to make Grandma's famous creamy carrot casserole, this bag of
          baby-cut carrots offers a classic snack the whole family can enjoy.
          For a sweet and simple treat, sprinkle brown sugar and cinnamon over
          the baby-cut carrots and bake them in the oven. <br /><br />Every
          product that carries the Good & Gather™ name starts with quality
          ingredients that deliver great taste, making it easier for you and
          your family to eat well, every day. We promise you’ll love each bite,
          or your money back.
        soft_bullet_description:
          "&bull;Peeled baby-cut carrots offer a great option for
          snacks, salads, side dishes and more<br>&bull;Packaged in a 1lb bag,
          conveniently prewashed and ready to eat<br>&bull;Provides an excellent
          source of vitamin A with no artifical preservatives<br>&bull;Product
